<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>당신의 사랑을 이루어 줍니다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Gowun+Dodum&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --plum:#1a0e2e;
    --plum2:#2e1340;
    --rose:#f5a9c5;
    --gold:#e8c170;
    --soft:#f3e6d8;
    --glass:rgba(255,255,255,0.07);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Gowun Dodum',sans-serif;
    color:var(--soft);
    background:
      radial-gradient(ellipse 60% 50% at 75% 18%, rgba(245,169,197,0.28), transparent 70%),
      radial-gradient(ellipse 70% 60% at 15% 90%, rgba(232,193,112,0.18), transparent 70%),
      linear-gradient(165deg,#1a0e2e 0%,#2e1340 45%,#3d1a3a 75%,#4a1f33 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    overflow-x:hidden;
    position:relative;
  }

  /* ===== 배경 별 / 하트 ===== */
  .sky{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
  .star{
    position:absolute;width:3px;height:3px;border-radius:50%;
    background:#fff;opacity:0.7;
    animation:twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:0.15;transform:scale(0.6);}
    50%{opacity:0.95;transform:scale(1.3);}
  }
  .moon{
    position:fixed;top:8%;right:10%;width:120px;height:120px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fff7e8,#e8c170 60%,#c9974a);
    box-shadow:0 0 70px 20px rgba(232,193,112,0.35),0 0 140px 50px rgba(245,169,197,0.18);
    z-index:0;
  }
  .heart{
    position:absolute;font-size:20px;color:var(--rose);
    opacity:0;animation:float-up 9s linear infinite;
    filter:drop-shadow(0 0 6px rgba(245,169,197,0.6));
  }
  @keyframes float-up{
    0%{transform:translateY(20px) scale(0.5) rotate(0deg);opacity:0;}
    15%{opacity:0.85;}
    85%{opacity:0.7;}
    100%{transform:translateY(-110vh) scale(1) rotate(25deg);opacity:0;}
  }

  /* ===== 카드 ===== */
  .card{
    position:relative;z-index:2;
    width:100%;max-width:440px;
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:28px;
    padding:48px 38px 44px;
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    box-shadow:0 30px 80px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.12);
    text-align:center;
    animation:rise 1s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}

  .emblem{
    font-size:38px;margin-bottom:6px;
    animation:beat 1.8s ease-in-out infinite;
    display:inline-block;
  }
  @keyframes beat{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}

  .title{
    font-family:'Song Myung',serif;
    font-size:30px;line-height:1.5;
    color:#fff;
    letter-spacing:1px;
    margin-bottom:10px;
  }
  .title .accent{
    color:var(--rose);
    text-shadow:0 0 18px rgba(245,169,197,0.7);
  }
  .subtitle{
    font-family:'Gowun Batang',serif;
    font-size:14px;color:rgba(243,230,216,0.72);
    line-height:1.8;
    margin-bottom:34px;
  }

  .divider{
    width:60px;height:1px;margin:0 auto 30px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
  }

  .field{margin-bottom:20px;text-align:left;}
  .field label{
    display:block;font-size:13px;
    color:var(--gold);
    margin-bottom:8px;letter-spacing:0.5px;
  }
  .field input{
    width:100%;
    padding:14px 16px;
    font-family:'Gowun Dodum',sans-serif;
    font-size:15px;
    color:var(--soft);
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:14px;
    outline:none;
    transition:border-color .25s,box-shadow .25s,background .25s;
  }
  .field input::placeholder{color:rgba(243,230,216,0.35);}
  .field input:focus{
    border-color:var(--rose);
    background:rgba(255,255,255,0.1);
    box-shadow:0 0 0 4px rgba(245,169,197,0.15);
  }

  .submit{
    width:100%;margin-top:14px;
    padding:15px;
    font-family:'Gowun Batang',serif;
    font-size:16px;font-weight:700;
    letter-spacing:2px;
    color:#2e1340;
    background:linear-gradient(135deg,#f5a9c5,#e8c170);
    border:none;border-radius:14px;
    cursor:pointer;
    transition:transform .15s,box-shadow .25s;
    box-shadow:0 10px 30px rgba(245,169,197,0.35);
  }
  .submit:hover{transform:translateY(-2px);box-shadow:0 16px 38px rgba(245,169,197,0.5);}
  .submit:active{transform:translateY(0);}

  .note{
    margin-top:18px;font-size:11px;
    color:rgba(243,230,216,0.4);
    font-family:'Gowun Batang',serif;
  }

  /* ===== 완료 메시지 ===== */
  .done{
    display:none;
    animation:rise .7s cubic-bezier(.2,.7,.2,1) both;
  }
  .done .big{
    font-size:46px;margin-bottom:14px;
    animation:beat 1.6s ease-in-out infinite;
  }
  .done h2{
    font-family:'Song Myung',serif;
    font-size:24px;color:#fff;margin-bottom:12px;
  }
  .done p{
    font-family:'Gowun Batang',serif;
    font-size:14px;line-height:1.9;
    color:rgba(243,230,216,0.78);
  }
</style>
</head>
<body>

<div class="moon"></div>
<div class="sky" id="sky"></div>

<div class="card">
  <!-- 입력 화면 -->
  <div id="form-view">
    <span class="emblem">💕</span>
    <h1 class="title">당신의 <span class="accent">사랑</span>을<br>이루어 줍니다</h1>
    <p class="subtitle">
      운명은 망설이는 자를 기다려주지 않습니다.<br>
      당신의 이름과 연락처를 별빛에 띄워주세요.
    </p>
    <div class="divider"></div>

    <div class="field">
      <label for="name">이름</label>
      <input type="text" id="name" placeholder="당신의 이름을 적어주세요">
    </div>
    <div class="field">
      <label for="phone">전화번호</label>
      <input type="tel" id="phone" placeholder="010-0000-0000">
    </div>

    <button class="submit" onclick="submitForm()">인연 신청하기</button>
    <p class="note">✦ 입력하신 정보는 소중하게 다루어집니다 ✦</p>
  </div>

  <!-- 완료 화면 -->
  <div id="done-view" class="done">
    <div class="big">🌙</div>
    <h2>신청이 완료되었어요</h2>
    <p id="done-msg"></p>
  </div>
</div>

<script>
  /* 별 생성 */
  const sky = document.getElementById('sky');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.animationDelay=Math.random()*3+'s';
    const sz=Math.random()*2+1.5;
    s.style.width=sz+'px';s.style.height=sz+'px';
    sky.appendChild(s);
  }
  /* 떠오르는 하트 */
  const hearts=['💗','💖','🤍','💕','✨'];
  setInterval(()=>{
    const h=document.createElement('div');
    h.className='heart';
    h.textContent=hearts[Math.floor(Math.random()*hearts.length)];
    h.style.left=Math.random()*100+'%';
    h.style.fontSize=(Math.random()*16+14)+'px';
    h.style.animationDuration=(Math.random()*5+7)+'s';
    sky.appendChild(h);
    setTimeout(()=>h.remove(),12000);
  },900);

  /* 전화번호 자동 하이픈 */
  const phone=document.getElementById('phone');
  phone.addEventListener('input',()=>{
    let v=phone.value.replace(/[^0-9]/g,'').slice(0,11);
    if(v.length<4) phone.value=v;
    else if(v.length<8) phone.value=v.slice(0,3)+'-'+v.slice(3);
    else phone.value=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
  });

  function submitForm(){
    const name=document.getElementById('name').value.trim();
    const num=phone.value.trim();
    if(!name){alert('이름을 입력해 주세요 🌸');return;}
    if(num.replace(/[^0-9]/g,'').length<10){alert('전화번호를 정확히 입력해 주세요 📞');return;}
    document.getElementById('done-msg').innerHTML=
      name+' 님,<br>당신의 인연을 별빛에 띄웠습니다.<br>곧 운명이 답을 전해올 거예요.';
    document.getElementById('form-view').style.display='none';
    document.getElementById('done-view').style.display='block';
  }
</script>
</body>
</html>
